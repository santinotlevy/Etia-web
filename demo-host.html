<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Etia Host — Demo del dashboard</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Variables ── */
:root {
  --navy:    #0F2A4A;
  --navy-0:  #0B2038;
  --navy-1:  #122F52;
  --navy-2:  #1A3F6F;
  --navy-3:  #234A7E;
  --line:    rgba(237,232,216,0.08);
  --line-2:  rgba(237,232,216,0.14);
  --crema:   #EDE8D8;
  --crema-d: rgba(237,232,216,0.62);
  --crema-d2:rgba(237,232,216,0.40);
  --crema-d3:rgba(237,232,216,0.22);
  --accent:  #4A9EFF;
  --accent-2:#2E7EE6;
  --accent-g:rgba(74,158,255,0.14);
  --ok:      #3BC28B;
  --warn:    #F0B946;
  --bad:     #E86A6A;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow:hidden;height:100vh;width:100vw;background:#05101F;color:var(--crema);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}

/* ── Stage & Canvas ── */
#stage{position:fixed;inset:0;background:#05101F;overflow:hidden;}
#canvas{
  width:1920px;height:1080px;
  position:absolute;left:50%;top:50%;
  transform-origin:center center;
  transform:translate(-50%,-50%) scale(1);
  background:
    radial-gradient(1200px 600px at 20% 0%,rgba(74,158,255,0.06),transparent 60%),
    radial-gradient(900px 500px at 85% 100%,rgba(74,158,255,0.04),transparent 60%),
    var(--navy);
  display:grid;grid-template-rows:72px 1fr;
  overflow:hidden;
}

/* ── Topbar ── */
.topbar{display:grid;grid-template-columns:260px 1fr auto;align-items:center;padding:0 32px;height:72px;border-bottom:1px solid var(--line);background:rgba(11,32,56,0.55);backdrop-filter:blur(12px);position:relative;z-index:10;}
.brand{display:flex;align-items:center;gap:12px;}
.brand .wm{line-height:1;}
.brand .wm .n{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:22px;color:var(--crema);letter-spacing:-0.01em;}
.brand .wm .k{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.28em;color:var(--crema-d2);text-transform:uppercase;margin-top:2px;display:block;}
.top-center{display:flex;align-items:center;gap:14px;justify-content:center;}
.rest-chip{display:inline-flex;align-items:center;gap:10px;padding:8px 14px 8px 10px;border-radius:100px;background:rgba(237,232,216,0.06);border:1px solid var(--line-2);cursor:pointer;transition:background .15s,border-color .15s;}
.rest-chip:hover{background:rgba(237,232,216,0.09);border-color:rgba(237,232,216,0.22);}
.rest-chip .av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#E4DDC8,#D8CFB7);color:var(--navy);display:grid;place-items:center;font-size:10px;font-weight:700;}
.rest-chip .nm{font-size:13px;font-weight:600;color:var(--crema);}
.rest-chip .city{font-size:11px;color:var(--crema-d2);}
.live-dot{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--crema-d);}
.live-dot .d{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(59,194,139,0.6);animation:pulseOk 1.8s infinite;}
@keyframes pulseOk{0%{box-shadow:0 0 0 0 rgba(59,194,139,0.6);}70%{box-shadow:0 0 0 8px rgba(59,194,139,0);}100%{box-shadow:0 0 0 0 rgba(59,194,139,0);}}
.top-right{display:flex;align-items:center;gap:18px;}
.clock{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.4;text-align:right;color:var(--crema-d);}
.clock b{color:var(--crema);font-weight:500;letter-spacing:0.02em;}
.icon-btn{width:36px;height:36px;border-radius:10px;background:rgba(237,232,216,0.05);border:1px solid var(--line-2);display:grid;place-items:center;cursor:pointer;position:relative;transition:background .15s,border-color .15s;}
.icon-btn:hover{background:rgba(237,232,216,0.1);border-color:rgba(237,232,216,0.22);}
.icon-btn svg{width:16px;height:16px;color:var(--crema-d);}
.icon-btn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--navy);box-shadow:0 0 0 0 rgba(74,158,255,0.7);animation:pulseDot 2s infinite;}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(74,158,255,0.6);}70%{box-shadow:0 0 0 7px rgba(74,158,255,0);}100%{box-shadow:0 0 0 0 rgba(74,158,255,0);}}
.profile-chip{display:inline-flex;align-items:center;gap:10px;padding:4px 12px 4px 4px;border-radius:100px;background:rgba(237,232,216,0.05);border:1px solid var(--line-2);cursor:pointer;}
.profile-chip .av2{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#0B2038;display:grid;place-items:center;font-size:11px;font-weight:700;}
.profile-chip .nm{font-size:12px;font-weight:500;color:var(--crema);line-height:1.1;}
.profile-chip .rl{font-size:10px;color:var(--crema-d2);line-height:1.1;margin-top:2px;}

/* ── Main layout ── */
.main{display:grid;grid-template-columns:64px 1fr;overflow:hidden;min-height:0;height:1008px;}
.rail{border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:6px;background:rgba(11,32,56,0.3);}
.rail-btn{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;color:var(--crema-d2);cursor:pointer;position:relative;transition:background .15s,color .15s;}
.rail-btn:hover{background:rgba(237,232,216,0.06);color:var(--crema);}
.rail-btn.on{background:rgba(74,158,255,0.12);color:var(--accent);}
.rail-btn.on::before{content:'';position:absolute;left:-12px;top:8px;bottom:8px;width:2px;background:var(--accent);border-radius:2px;}
.rail-btn svg{width:18px;height:18px;}
.rail-spacer{flex:1;}

/* ── Content ── */
.content{padding:24px 32px 28px;display:grid;grid-template-rows:auto auto 1fr 1fr;gap:20px;overflow:hidden;min-height:0;}
.content.flex-screen{display:flex!important;flex-direction:column;gap:20px;}
.content.flex-screen > *{min-height:0;}

/* ── Page head ── */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;}
.ph-l .kicker{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--crema-d2);display:flex;align-items:center;gap:10px;}
.ph-l .kicker .sep{width:4px;height:4px;border-radius:50%;background:var(--crema-d3);}
.ph-l h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:42px;line-height:1;margin:6px 0 0;letter-spacing:-0.015em;color:var(--crema);}
.ph-l h1 .em{color:var(--accent);font-style:italic;}
.ph-r{display:flex;align-items:center;gap:10px;}
.seg{display:inline-flex;padding:4px;background:rgba(237,232,216,0.05);border:1px solid var(--line-2);border-radius:10px;}
.seg button{background:none;border:none;padding:7px 14px;border-radius:7px;font-family:'DM Sans';font-size:12px;font-weight:500;color:var(--crema-d);cursor:pointer;transition:background .15s,color .15s;}
.seg button.on{background:var(--crema);color:var(--navy);}
.btn-ghost{padding:9px 14px;border-radius:10px;background:rgba(237,232,216,0.05);border:1px solid var(--line-2);color:var(--crema);font-family:'DM Sans';font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:8px;cursor:pointer;}
.btn-ghost:hover{background:rgba(237,232,216,0.1);}
.btn-ghost svg{width:14px;height:14px;}

/* ── KPI cards ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.kpi{background:linear-gradient(180deg,rgba(237,232,216,0.015),rgba(0,0,0,0) 40%),var(--navy-2);border:1px solid var(--line-2);border-radius:14px;padding:18px 20px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.kpi:hover{border-color:rgba(74,158,255,0.35);}
.kpi::after{content:'';position:absolute;inset:0 auto 0 0;width:2px;background:linear-gradient(180deg,var(--accent),transparent);opacity:0;transition:opacity .2s;}
.kpi:hover::after{opacity:1;}
.kpi .k-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.kpi .k-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--crema-d2);}
.kpi .k-ic{width:28px;height:28px;border-radius:8px;background:rgba(74,158,255,0.12);color:var(--accent);display:grid;place-items:center;}
.kpi .k-ic svg{width:14px;height:14px;}
.kpi .k-val{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:56px;line-height:1;letter-spacing:-0.02em;color:var(--crema);display:flex;align-items:baseline;gap:6px;}
.kpi .k-val .cur{font-size:26px;color:var(--crema-d);margin-right:2px;}
.kpi .k-val .u{font-size:18px;color:var(--crema-d2);font-style:italic;margin-left:2px;}
.kpi .k-sub{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px;}
.kpi .delta{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;font-family:'DM Sans';}
.kpi .delta.up{background:rgba(59,194,139,0.15);color:var(--ok);}
.kpi .delta.down{background:rgba(232,106,106,0.15);color:var(--bad);}
.kpi .delta svg{width:10px;height:10px;}
.kpi .k-spark{flex:1;display:flex;align-items:flex-end;gap:2px;height:22px;}
.kpi .k-spark span{flex:1;background:rgba(74,158,255,0.45);border-radius:1px;min-height:2px;transition:background .15s;}
.kpi .k-spark span.hi{background:var(--accent);}
.kpi .k-note{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--crema-d2);letter-spacing:0.12em;}

/* ── Panels ── */
.panel{background:var(--navy-2);border:1px solid var(--line-2);border-radius:14px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.panel.accent{border-color:rgba(74,158,255,0.45);background:linear-gradient(160deg,rgba(74,158,255,0.08),rgba(74,158,255,0) 55%),var(--navy-2);}
.p-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--line);flex:0 0 auto;}
.p-head .l{display:flex;align-items:center;gap:10px;}
.p-head h2{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:22px;margin:0;color:var(--crema);letter-spacing:-0.01em;}
.p-head .kk{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--crema-d2);padding-left:10px;margin-left:2px;border-left:1px solid var(--line-2);}
.p-head .actions{display:flex;align-items:center;gap:8px;}
.p-head .pill-btn{font-family:'DM Sans';font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;background:rgba(237,232,216,0.06);color:var(--crema-d);border:1px solid var(--line-2);cursor:pointer;transition:all .15s;}
.p-head .pill-btn:hover{background:rgba(237,232,216,0.12);color:var(--crema);}
.p-head .pill-btn.on{background:var(--accent);color:#0B2038;border-color:var(--accent);}
.p-body{padding:16px 20px 20px;flex:1;min-height:0;overflow:auto;}
.p-body::-webkit-scrollbar{width:6px;}
.p-body::-webkit-scrollbar-thumb{background:rgba(237,232,216,0.1);border-radius:3px;}
.mid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;min-height:0;}
.bot{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;min-height:0;}

/* ── Dish bars ── */
.bar-row{display:grid;grid-template-columns:1fr 78px;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;}
.bar-row:last-child{border-bottom:none;}
.bar-row:hover{background:rgba(237,232,216,0.02);}
.bar-row .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.bar-row .name{font-size:13px;font-weight:500;color:var(--crema);display:flex;align-items:center;gap:8px;}
.bar-row .name .rk{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--crema-d3);letter-spacing:0.14em;}
.bar-row .sub{font-size:11px;color:var(--crema-d2);}
.bar-row .sub b{color:var(--crema-d);font-weight:500;}
.bar-row .track{height:10px;background:rgba(237,232,216,0.05);border-radius:6px;position:relative;overflow:hidden;}
.bar-row .fill{height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));border-radius:6px;transition:width .8s cubic-bezier(.2,.7,.2,1);position:relative;}
.bar-row .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);animation:shimmer 3s infinite;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.bar-row.low .fill{background:linear-gradient(90deg,rgba(74,158,255,0.35),rgba(74,158,255,0.55));}
.bar-row .pct{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:30px;line-height:1;color:var(--crema);text-align:right;letter-spacing:-0.01em;}
.bar-row .pct small{font-size:14px;color:var(--crema-d2);margin-left:2px;}
.bar-row.sel{background:rgba(74,158,255,0.07);}
.bar-row.sel .name{color:var(--accent);}
.dish-foot{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line-2);display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.dish-foot .f{display:flex;flex-direction:column;gap:2px;}
.dish-foot .f .kl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--crema-d2);}
.dish-foot .f .vv{font-size:14px;font-weight:500;color:var(--crema);}

/* ── Intelligence panel ── */
.ai-ic{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#0B2038;display:grid;place-items:center;position:relative;}
.ai-ic::before{content:'';position:absolute;inset:-4px;border-radius:12px;background:radial-gradient(circle,rgba(74,158,255,0.3),transparent 70%);z-index:-1;}
.ai-ic svg{width:16px;height:16px;}
.insight{display:grid;grid-template-columns:28px 1fr auto;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line);}
.insight:last-child{border-bottom:none;}
.insight .idx{width:24px;height:24px;border-radius:6px;background:rgba(74,158,255,0.14);color:var(--accent);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;}
.insight .body .tag{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--crema-d2);margin-bottom:6px;}
.insight .body .tag .dt{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.insight .body .tag.warn .dt{background:var(--warn);}
.insight .body .tag.warn{color:var(--warn);}
.insight .body .tx{font-size:13px;line-height:1.55;color:var(--crema);}
.insight .body .tx em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--accent);font-size:15px;}
.insight .body .tx b{color:var(--crema);font-weight:600;}
.insight .body .acts{margin-top:10px;display:flex;gap:8px;}
.insight .body .acts button{font-family:'DM Sans';font-size:11px;font-weight:500;padding:6px 11px;border-radius:7px;background:transparent;color:var(--crema);border:1px solid var(--line-2);cursor:pointer;transition:all .15s;}
.insight .body .acts button.primary{background:var(--accent);color:#0B2038;border-color:var(--accent);font-weight:600;}
.insight .body .acts button.primary:hover{background:#6bb0ff;}
.insight .body .acts button:hover{background:rgba(237,232,216,0.06);}
.insight .x{width:22px;height:22px;border-radius:6px;color:var(--crema-d3);display:grid;place-items:center;cursor:pointer;transition:color .15s,background .15s;}
.insight .x:hover{color:var(--crema);background:rgba(237,232,216,0.06);}
.insight .x svg{width:12px;height:12px;}
.ai-status{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:rgba(74,158,255,0.06);border:1px solid rgba(74,158,255,0.22);margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);}
.ai-status .ld{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulseDot2 1.4s infinite;}
@keyframes pulseDot2{0%,100%{opacity:0.35;transform:scale(1);}50%{opacity:1;transform:scale(1.3);}}

/* ── Reservations ── */
.res-list{display:flex;flex-direction:column;}
.res{display:grid;grid-template-columns:58px 1fr auto auto;gap:14px;align-items:center;padding:10px 10px 10px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;border-radius:6px;}
.res:hover{background:rgba(237,232,216,0.03);}
.res .hr{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--crema);font-weight:500;letter-spacing:0.02em;text-align:right;}
.res .hr .mer{display:block;font-size:9px;color:var(--crema-d3);letter-spacing:0.2em;margin-top:2px;}
.res .mid{display:flex;flex-direction:column;gap:3px;min-width:0;}
.res .nm{font-size:13px;font-weight:500;color:var(--crema);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.res .mt{font-size:11px;color:var(--crema-d2);display:flex;align-items:center;gap:8px;}
.res .pax{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--crema-d);font-family:'JetBrains Mono';font-weight:500;padding:4px 8px;border-radius:6px;background:rgba(237,232,216,0.04);}
.res .pax svg{width:12px;height:12px;}
.res .pax b{color:var(--crema);}
.status{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;padding:5px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid transparent;cursor:pointer;user-select:none;transition:filter .15s;}
.status:hover{filter:brightness(1.15);}
.status .d{width:5px;height:5px;border-radius:50%;background:currentColor;}
.status.confirmed{background:rgba(59,194,139,0.14);color:var(--ok);border-color:rgba(59,194,139,0.25);}
.status.pending{background:rgba(240,185,70,0.14);color:var(--warn);border-color:rgba(240,185,70,0.28);}
.status.seated{background:rgba(74,158,255,0.14);color:var(--accent);border-color:rgba(74,158,255,0.3);}
.status.cancelled{background:rgba(232,106,106,0.14);color:var(--bad);border-color:rgba(232,106,106,0.28);}
.res-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.res-stat{padding:10px 12px;background:rgba(237,232,216,0.025);border-radius:10px;border:1px solid var(--line);}
.res-stat .kl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--crema-d2);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.res-stat .kl .d{width:5px;height:5px;border-radius:50%;}
.res-stat .vv{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:22px;color:var(--crema);line-height:1;}

/* ── Team table ── */
.team-tbl{display:grid;grid-template-columns:36px 1.3fr 1fr 1fr 1fr 50px;column-gap:14px;row-gap:0;align-items:center;}
.team-tbl .th{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--crema-d2);padding:0 0 10px;border-bottom:1px solid var(--line);}
.team-tbl .th.r{text-align:right;}
.team-tbl .row-wrap{display:contents;cursor:pointer;}
.team-tbl .cell{padding:14px 0;border-bottom:1px solid var(--line);display:flex;align-items:center;}
.team-tbl .cell.r{justify-content:flex-end;}
.team-tbl .row-wrap:last-of-type .cell{border-bottom:none;}
.team-tbl .row-wrap.on .cell{background:rgba(74,158,255,0.04);}
.team-tbl .t-av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:600;font-family:'DM Sans';color:var(--navy);background:linear-gradient(135deg,#E4DDC8,#D8CFB7);position:relative;}
.team-tbl .t-av.active::after{content:'';position:absolute;right:-1px;bottom:-1px;width:10px;height:10px;border-radius:50%;background:var(--ok);border:2px solid var(--navy-2);}
.team-tbl .t-nm{display:flex;flex-direction:column;gap:2px;}
.team-tbl .t-nm .n{font-size:13px;font-weight:500;color:var(--crema);}
.team-tbl .t-nm .r2{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--crema-d2);display:flex;align-items:center;gap:6px;}
.team-tbl .t-nm .r2 .pin{width:4px;height:4px;border-radius:50%;background:var(--accent);}
.team-tbl .num{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:var(--crema);line-height:1;letter-spacing:-0.01em;}
.team-tbl .num .cur{font-size:12px;color:var(--crema-d2);margin-right:2px;}
.team-tbl .num .su{display:block;font-family:'DM Sans';font-size:10px;font-style:normal;color:var(--crema-d2);margin-top:3px;letter-spacing:0.06em;}
.stars{display:inline-flex;gap:2px;align-items:center;}
.stars svg{width:13px;height:13px;}
.stars .sv{font-family:'JetBrains Mono';font-size:11px;color:var(--crema-d);margin-left:6px;font-weight:500;}
.team-tbl .menu-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--crema-d2);cursor:pointer;transition:background .15s,color .15s;}
.team-tbl .menu-btn:hover{background:rgba(237,232,216,0.06);color:var(--crema);}
.team-foot{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line-2);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--crema-d2);}
.team-foot .ll{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;}
.team-foot .rr b{color:var(--crema);font-family:'Instrument Serif';font-style:italic;font-size:18px;font-weight:400;margin:0 4px;}

/* ── Modal ── */
.modal-backdrop{position:absolute;inset:0;background:rgba(5,16,31,0.72);backdrop-filter:blur(6px);display:grid;place-items:center;z-index:100;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.modal{width:720px;max-height:85vh;background:linear-gradient(160deg,rgba(74,158,255,0.08),rgba(74,158,255,0) 55%),#1A3F6F;border:1px solid rgba(74,158,255,0.45);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,0.5);display:flex;flex-direction:column;animation:slideUp .25s cubic-bezier(.2,.7,.2,1);overflow:hidden;}
.modal-head{padding:22px 26px 18px;border-bottom:1px solid rgba(237,232,216,0.08);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.modal-head .tag{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.2em;text-transform:uppercase;color:#4A9EFF;margin-bottom:10px;}
.modal-head .tag .dt{width:5px;height:5px;border-radius:50%;background:currentColor;}
.modal-head .tag.warn{color:#F0B946;}
.modal-head h3{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:28px;margin:0;color:#EDE8D8;line-height:1.15;letter-spacing:-0.01em;}
.modal-head .close{width:32px;height:32px;border-radius:8px;background:rgba(237,232,216,0.05);border:1px solid rgba(237,232,216,0.14);display:grid;place-items:center;color:rgba(237,232,216,0.62);cursor:pointer;flex:0 0 auto;transition:all .15s;}
.modal-head .close:hover{background:rgba(237,232,216,0.1);color:#EDE8D8;}
.modal-head .close svg{width:14px;height:14px;}
.modal-body{padding:22px 26px 26px;overflow-y:auto;flex:1;min-height:0;}
.modal-body::-webkit-scrollbar{width:6px;}
.modal-body::-webkit-scrollbar-thumb{background:rgba(237,232,216,0.1);border-radius:3px;}
.modal-foot{padding:16px 26px;border-top:1px solid rgba(237,232,216,0.08);display:flex;justify-content:flex-end;gap:10px;background:rgba(11,32,56,0.4);}
.mhist{margin:16px 0 6px;padding:18px 20px;background:rgba(237,232,216,0.025);border:1px solid rgba(237,232,216,0.08);border-radius:12px;}
.mhist .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.mhist .lbl{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(237,232,216,0.4);}
.mhist .big{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:30px;color:#EDE8D8;line-height:1;}
.mhist .big small{font-size:14px;color:rgba(237,232,216,0.4);margin-left:3px;}
.mhist .delta-inline{display:inline-flex;align-items:center;gap:5px;margin-left:10px;font-size:11px;font-weight:600;color:#3BC28B;}
.mhist .chart{height:110px;position:relative;display:flex;align-items:flex-end;gap:6px;}
.mhist .chart .col{flex:1;position:relative;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;cursor:pointer;}
.mhist .chart .col .bar{width:100%;background:linear-gradient(180deg,#4A9EFF,rgba(74,158,255,0.35));border-radius:4px 4px 0 0;transition:opacity .15s;}
.mhist .chart .col:hover .bar{opacity:0.85;}
.mhist .chart .col.cur .bar{background:linear-gradient(180deg,#EDE8D8,rgba(237,232,216,0.5));}
.mhist .chart .col .mo{font-family:'JetBrains Mono';font-size:9px;color:rgba(237,232,216,0.4);letter-spacing:0.12em;}
.mhist .chart .col.cur .mo{color:#EDE8D8;}
.mhist .chart .col .val{position:absolute;top:-18px;font-family:'JetBrains Mono';font-size:10px;color:rgba(237,232,216,0.5);}
.mhist .chart .col.cur .val{color:#4A9EFF;}
.cust-row{display:grid;grid-template-columns:42px 1fr auto auto;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(237,232,216,0.08);}
.cust-row:last-child{border-bottom:none;}
.cust-row .cav{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#E4DDC8,#D8CFB7);color:#0F2A4A;display:grid;place-items:center;font-size:12px;font-weight:700;}
.cust-row .info .n{font-size:14px;font-weight:500;color:#EDE8D8;line-height:1.2;}
.cust-row .info .s{font-size:11px;color:rgba(237,232,216,0.5);margin-top:3px;display:flex;align-items:center;gap:8px;}
.cust-row .info .s .dot{width:3px;height:3px;border-radius:50%;background:rgba(237,232,216,0.3);}
.cust-row .days{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#F0B946;}
.cust-row .days small{font-size:10px;color:rgba(237,232,216,0.4);margin-left:3px;font-style:normal;font-family:'JetBrains Mono';letter-spacing:0.1em;text-transform:uppercase;}
.send-btn{font-family:'DM Sans';font-size:11px;font-weight:600;padding:8px 13px;border-radius:8px;background:#4A9EFF;color:#0B2038;border:1px solid #4A9EFF;cursor:pointer;transition:all .15s;}
.send-btn:hover{background:#6bb0ff;}
.send-btn.done{background:rgba(59,194,139,0.15);color:#3BC28B;border-color:rgba(59,194,139,0.4);cursor:default;}
.primary-cta{font-family:'DM Sans';font-size:13px;font-weight:600;padding:10px 18px;border-radius:9px;background:#4A9EFF;color:#0B2038;border:1px solid #4A9EFF;cursor:pointer;transition:all .15s;}
.primary-cta:hover{background:#6bb0ff;}
.primary-cta.done{background:rgba(59,194,139,0.15);color:#3BC28B;border-color:rgba(59,194,139,0.4);cursor:default;}
.ghost-cta{font-family:'DM Sans';font-size:13px;font-weight:500;padding:10px 18px;border-radius:9px;background:transparent;color:#EDE8D8;border:1px solid rgba(237,232,216,0.14);cursor:pointer;}
.ghost-cta:hover{background:rgba(237,232,216,0.06);}

/* ── Fade-in entre pantallas ── */
@keyframes screenIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.content.screen-in{animation:screenIn .26s cubic-bezier(.2,.7,.2,1);}

/* ── KPIs clickeables (hover) ── */
.kpi[onclick]{transition:transform .18s ease, border-color .18s ease, background .18s ease;}
.kpi[onclick]:hover{transform:translateY(-2px);border-color:rgba(74,158,255,0.4);background:linear-gradient(160deg,rgba(74,158,255,0.05),rgba(74,158,255,0) 60%),var(--navy-2);}

/* ── Rest switcher modal ── */
.rs-list{display:flex;flex-direction:column;}
.rs-row{display:grid;grid-template-columns:48px 1fr auto;gap:14px;align-items:center;padding:14px 26px;border-bottom:1px solid rgba(237,232,216,0.06);cursor:pointer;transition:background .15s;}
.rs-row:hover{background:rgba(237,232,216,0.04);}
.rs-row:last-child{border-bottom:none;}
.rs-row .av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#E4DDC8,#D8CFB7);color:#0F2A4A;display:grid;place-items:center;font-size:13px;font-weight:700;font-family:'DM Sans';}
.rs-row .info .nm{font-size:14px;font-weight:600;color:#EDE8D8;}
.rs-row .info .city{font-size:11.5px;color:rgba(237,232,216,0.5);margin-top:3px;}
.rs-row .rs-mark{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.12em;color:#3BC28B;font-weight:600;}
.rs-row .rs-go{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:rgba(237,232,216,0.4);}
.rs-row.active{background:rgba(74,158,255,0.05);}
.rs-row.active .av{background:#4A9EFF;color:#0B2038;}

/* ── Profile menu modal ── */
.pm-list{display:flex;flex-direction:column;}
.pm-it{display:flex;gap:14px;align-items:flex-start;padding:11px 26px;cursor:pointer;transition:background .15s;}
.pm-it:hover{background:rgba(237,232,216,0.04);}
.pm-ic{width:30px;height:30px;border-radius:8px;background:rgba(74,158,255,0.12);color:#4A9EFF;display:grid;place-items:center;flex-shrink:0;}
.pm-t{font-size:13.5px;font-weight:500;color:#EDE8D8;line-height:1.2;}
.pm-d{font-size:11.5px;color:rgba(237,232,216,0.5);margin-top:3px;line-height:1.3;}

/* ── KPI drill-down modal ── */
.kd-list{display:flex;flex-direction:column;border:1px solid rgba(237,232,216,0.08);border-radius:10px;overflow:hidden;}
.kd-row{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(237,232,216,0.06);}
.kd-row:last-child{border-bottom:none;}
.kd-row:nth-child(odd){background:rgba(237,232,216,0.02);}
.kd-lbl{font-size:13px;color:rgba(237,232,216,0.85);}
.kd-val{font-family:'Instrument Serif',serif;font-style:italic;font-size:17px;color:#EDE8D8;line-height:1;}
.kd-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A9EFF;padding:3px 8px;background:rgba(74,158,255,0.1);border-radius:99px;font-weight:600;letter-spacing:0.04em;}

/* ── Undo bar (insights restaurados) ── */
.undo-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;margin:8px 0 0;background:rgba(237,232,216,0.04);border:1px dashed rgba(237,232,216,0.15);border-radius:10px;}
.undo-bar span{font-size:11.5px;color:rgba(237,232,216,0.55);}
.undo-bar span b{color:#EDE8D8;font-weight:600;}
.undo-bar button{background:transparent;border:none;color:#4A9EFF;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.06em;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s;}
.undo-bar button:hover{background:rgba(74,158,255,0.1);}

/* ── Reservas modal (lista) ── */
.rsv-list{display:flex;flex-direction:column;}
.rsv-row{display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:center;padding:16px 26px;border-bottom:1px solid rgba(237,232,216,0.06);cursor:pointer;transition:background .15s;}
.rsv-row:hover{background:rgba(237,232,216,0.03);}
.rsv-row:last-child{border-bottom:none;}
.rsv-time{display:flex;flex-direction:column;gap:2px;}
.rsv-time b{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#EDE8D8;font-weight:400;line-height:1;}
.rsv-time span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(237,232,216,0.4);}
.rsv-who .rsv-nm{font-size:14px;font-weight:600;color:#EDE8D8;line-height:1.2;}
.rsv-who .rsv-meta{font-size:11.5px;color:rgba(237,232,216,0.5);margin-top:4px;}
.rsv-pill{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border-radius:99px;font-weight:500;}
.rsv-pill.confirmed{background:rgba(59,194,139,0.15);color:#3BC28B;}
.rsv-pill.pending{background:rgba(240,185,70,0.15);color:#F0B946;}
.rsv-pill.seated{background:rgba(74,158,255,0.15);color:#4A9EFF;}
.rsv-pill.cancelled{background:rgba(232,106,106,0.12);color:#E86A6A;}

/* ── Menú modal (categorías) ── */
.m-cat{margin-bottom:22px;}
.m-cat:last-child{margin-bottom:0;}
.m-cat-hd{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(237,232,216,0.55);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(237,232,216,0.08);}
.m-it{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(237,232,216,0.05);}
.m-it:last-child{border-bottom:none;}
.m-it-nm{font-family:'Instrument Serif',serif;font-style:italic;font-size:17px;color:#EDE8D8;font-weight:400;line-height:1.2;}
.m-it-meta{font-size:11px;color:rgba(237,232,216,0.45);margin-top:3px;font-family:'JetBrains Mono';letter-spacing:0.04em;}
.m-it-r{text-align:right;}
.m-it-pr{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:#EDE8D8;line-height:1;}
.m-it-mg{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;margin-top:5px;font-weight:600;}

/* ── Caja modal (movimientos) ── */
.cj-list{display:flex;flex-direction:column;}
.cj-row{display:grid;grid-template-columns:100px 1fr auto;gap:18px;align-items:center;padding:14px 26px;border-bottom:1px solid rgba(237,232,216,0.06);transition:background .15s;}
.cj-row:last-child{border-bottom:none;}
.cj-row:hover{background:rgba(237,232,216,0.025);}
.cj-t{display:flex;flex-direction:column;gap:3px;}
.cj-t b{font-family:'JetBrains Mono',monospace;font-size:13px;color:#EDE8D8;font-weight:500;letter-spacing:0.03em;line-height:1;}
.cj-t span{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(237,232,216,0.45);}
.cj-d{font-size:13.5px;color:#EDE8D8;line-height:1.2;font-weight:500;}
.cj-met{font-size:11px;color:rgba(237,232,216,0.45);margin-top:3px;font-family:'JetBrains Mono';letter-spacing:0.03em;}
.cj-amt{text-align:right;font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:#EDE8D8;line-height:1;}
.cj-tip{font-size:10.5px;color:#3BC28B;margin-top:5px;font-family:'JetBrains Mono';letter-spacing:0.04em;font-style:normal;}

/* ── Toast ── */
.toast{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);padding:14px 20px;background:rgba(11,32,56,0.95);border:1px solid rgba(74,158,255,0.4);border-left:3px solid #3BC28B;border-radius:10px;color:#EDE8D8;font-size:13px;font-weight:500;display:flex;align-items:center;gap:12px;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,0.4);animation:toastIn .3s cubic-bezier(.2,.7,.2,1);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px);}to{opacity:1;transform:translate(-50%,0);}}
.toast .ok-ic{width:22px;height:22px;border-radius:50%;background:rgba(59,194,139,0.18);color:#3BC28B;display:grid;place-items:center;}
.toast .ok-ic svg{width:12px;height:12px;}

/* ── Side panel (drawer) ── */
.sp-backdrop{position:absolute;inset:0;background:rgba(5,16,31,0.5);z-index:90;animation:fadeIn .2s ease-out;}
.sp{position:absolute;top:0;right:0;bottom:0;width:480px;background:#122F52;border-left:1px solid rgba(237,232,216,0.14);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,0.4);animation:slideIn .3s cubic-bezier(.2,.7,.2,1);z-index:91;}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.sp-head{padding:20px 22px;background:linear-gradient(180deg,rgba(74,158,255,0.1),transparent);border-bottom:1px solid rgba(237,232,216,0.08);display:flex;align-items:flex-start;gap:14px;}
.sp-head .av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#E4DDC8,#D8CFB7);color:#0F2A4A;display:grid;place-items:center;font-size:18px;font-weight:700;flex:0 0 auto;}
.sp-head .n-wrap{flex:1;}
.sp-head h3{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:26px;color:#EDE8D8;margin:0;line-height:1.1;}
.sp-head .sub{margin-top:4px;font-size:11px;color:rgba(237,232,216,0.5);display:flex;align-items:center;gap:8px;}
.sp-head .sub .dot{width:3px;height:3px;border-radius:50%;background:rgba(237,232,216,0.3);}
.sp-body{flex:1;padding:20px 22px;overflow-y:auto;}
.sp-body::-webkit-scrollbar{width:5px;}
.sp-body::-webkit-scrollbar-thumb{background:rgba(237,232,216,0.1);border-radius:3px;}
.lvl-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;font-family:'JetBrains Mono';font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;margin-top:8px;}
.lvl-badge .dt{width:6px;height:6px;border-radius:50%;background:currentColor;}
.lvl-badge.silver{background:rgba(192,192,192,0.12);color:#C8C8C8;border:1px solid rgba(192,192,192,0.28);}
.lvl-badge.gold{background:rgba(240,185,70,0.12);color:#F0B946;border:1px solid rgba(240,185,70,0.3);}
.lvl-badge.explorer{background:rgba(74,158,255,0.12);color:#4A9EFF;border:1px solid rgba(74,158,255,0.3);}
.sp-kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.sp-kpi{padding:12px 14px;background:rgba(237,232,216,0.03);border:1px solid rgba(237,232,216,0.08);border-radius:10px;}
.sp-kpi .kl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(237,232,216,0.4);margin-bottom:6px;}
.sp-kpi .vv{font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;color:#EDE8D8;line-height:1;}
.sp-kpi .vv .cur{font-size:12px;color:rgba(237,232,216,0.4);margin-right:2px;}
.sp-sec{margin-bottom:20px;}
.sp-sec .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sp-sec h4{font-family:'JetBrains Mono';font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(237,232,216,0.6);margin:0;font-weight:500;}
.fav-dish{display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(237,232,216,0.06);}
.fav-dish:last-child{border-bottom:none;}
.fav-dish .thumb{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,#234A7E,#122F52);display:grid;place-items:center;border:1px solid rgba(237,232,216,0.08);color:rgba(237,232,216,0.3);font-size:18px;}
.fav-dish .nm{font-size:13px;font-weight:500;color:#EDE8D8;}
.fav-dish .ct{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:#4A9EFF;}
.fav-dish .ct small{font-size:10px;color:rgba(237,232,216,0.4);margin-left:2px;font-style:normal;font-family:'JetBrains Mono';letter-spacing:0.1em;}
.alert-banner{background:linear-gradient(90deg,rgba(74,158,255,0.18),rgba(74,158,255,0.04));border:1px solid rgba(74,158,255,0.5);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;flex:0 0 auto;}

<style>
#splash{position:fixed;inset:0;background:#0B2038;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;transition:opacity .45s ease}
#splash.done{opacity:0;pointer-events:none}
#splash img{height:32px;width:auto;animation:spPulse 1.6s ease-in-out infinite}
@keyframes spPulse{0%,100%{opacity:.6}50%{opacity:1}}
#splash .sp-bar{width:150px;height:2px;background:rgba(237,232,216,.12);border-radius:99px;overflow:hidden}
#splash .sp-bar i{display:block;height:100%;width:40%;background:#4A9EFF;border-radius:99px;animation:spSlide 1.1s ease-in-out infinite}
@keyframes spSlide{0%{transform:translateX(-150%)}100%{transform:translateX(400%)}}
#splash .sp-t{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.2em;color:rgba(237,232,216,.4)}
@media(prefers-reduced-motion:reduce){#splash img,#splash .sp-bar i{animation:none}}
</style>
<div id="splash" aria-hidden="true">
  <img src="etia-wordmark-cream.png" alt=""/>
  <div class="sp-bar"><i></i></div>
  <div class="sp-t">CARGANDO LA DEMO</div>
</div>
<script>
(function(){
  var s=document.getElementById('splash'),t0=Date.now(),hidden=false;
  function hide(){
    if(hidden)return;hidden=true;
    var d=Math.max(0,900-(Date.now()-t0));
    setTimeout(function(){s.classList.add('done');setTimeout(function(){s.remove()},500)},d);
  }
  if(document.readyState==='complete')hide();
  else window.addEventListener('load',hide);
  setTimeout(hide,2600);
})();
</script>

  monday.setDate(today.getDate() - ((day+6)%7));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate()+6);
  return `${monday.getDate()} ${MES_AR[monday.getMonth()]} – ${sunday.getDate()} ${MES_AR[sunday.getMonth()]}`;
}

    renderRail(); // refrescar por si cambió algo visual

  railActive  = i;
  S.screen    = item.screen;
  S.modal     = null;
  S.sidePanel = null;
  renderModal();
  renderSidePanel();
  renderRail();
  renderContent();
}

/* ── Dish panel ── */
function getSortedDishes() {
  const arr = [...DISHES];
  if      (S.dishSort === 'margin')  arr.sort((a,b) => b.margin - a.margin);
  else if (S.dishSort === 'sold')    arr.sort((a,b) => b.sold - a.sold);
  else                               arr.sort((a,b) => (b.sold*b.price) - (a.sold*a.price));
  return arr;
}
function dishBodyHTML() {
  const sorted  = getSortedDishes();
  const maxSold = Math.max(...sorted.map(d => d.sold));
  const maxRev  = Math.max(...sorted.map(d => d.sold*d.price));
  const totalSold = sorted.reduce((s,d) => s+d.sold, 0);
  const totalRev  = sorted.reduce((s,d) => s+d.sold*d.price, 0);
  const avgMargin = Math.round(sorted.reduce((s,d) => s+d.margin, 0)/sorted.length);

  const rows = sorted.map((d, i) => {
    const barW = S.dishSort==='margin' ? d.margin
      : Math.round((S.dishSort==='sold' ? d.sold : d.sold*d.price) / (S.dishSort==='sold' ? maxSold : maxRev) * 100);
    const valHTML = S.dishSort==='margin' ? `${d.margin}<small>%</small>`
      : S.dishSort==='sold'    ? `${d.sold}<small> u</small>`
      : `<small>$</small>${ars(Math.round(d.sold*d.price/1000)).split(',')[0]}<small>k</small>`;
    return `
<div class="bar-row${d.low?' low':''}${S.dishSel===i?' sel':''}" onclick="setDishSel(${i})">
  <div>
    <div class="top">
      <div class="name"><span class="rk">${String(i+1).padStart(2,'0')}</span><span>${d.name}</span></div>
      <div class="sub"><b>${d.sold}</b> vendidos · <b>$${ars(d.price)}</b></div>
    </div>
    <div class="track"><div class="fill" style="width:${barW}%"></div></div>
  </div>
  <div class="pct">${valHTML}</div>
</div>`;
  }).join('');

  return rows + `
<div class="dish-foot">
  <div class="f"><span class="kl">Platos vendidos</span><span class="vv">${totalSold}</span></div>
  <div class="f"><span class="kl">Ingresos de platos</span><span class="vv">$${ars(totalRev)}</span></div>
  <div class="f"><span class="kl">Margen promedio</span><span class="vv">${avgMargin}%</span></div>
</div>`;
}

function renderModal() {
  document.querySelectorAll('#canvas > .modal-backdrop').forEach(e => e.remove());
  if (!S.modal) return;
  const div = document.createElement('div');
  div.className = 'modal-backdrop';
  div.onclick   = e => { if (e.target === div) closeModal(); };
  div.innerHTML  = modalInnerHTML(S.modal);
  document.getElementById('canvas').appendChild(div);
}
function closeModal() { S.modal = null; renderModal(); }

function modalInnerHTML(id) {
  if (id === 'opp-salmon')   return salmonModalHTML();
  if (id === 'ret-3')        return retentionModalHTML();
  if (id === 'inv-burger')   return burgerModalHTML();
  if (id === 'reservas-all') return reservasAllModalHTML();
  if (id === 'menu-list')    return menuListModalHTML();
  if (id === 'caja-today')   return cajaTodayModalHTML();
  if (id === 'rest-switch')  return restSwitcherModalHTML();
  if (id === 'profile-menu') return profileMenuModalHTML();
  if (id === 'kpi-detail')   return kpiDetailModalHTML();
  if (id === 'demo-intro')   return demoIntroModalHTML();
  return '';
}

function intActiveCount(filterId) {

  return filterId === 'all' ? active.length : active.filter(x => x.cat === filterId).length;
}
function intVisible() {
  return INT_INSIGHTS.filter(x =>
    !S.intDismissed[x.id] &&
    (S.intFilter === 'all' || x.cat === S.intFilter)

}

function intGridHTML() {
  const visible = intVisible();

      No hay insights en esta categoría.
    </div>`;
  }
  return visible.map(x => `
<div class="int-card">
  <div class="top">
    <span class="ctag ${x.cls}">${x.cat}</span>
    <span class="impact ${x.impact}"><span class="d"></span><span>Impacto ${x.impact === 'hi' ? 'Alto' : 'Medio'}</span></span>

    <div class="acts">

}

  return INT_FILTERS.map(f => `

/* ── Intelligence handlers ── */
function intSetFilter(f) {
  S.intFilter = f;
  const filtersEl = document.getElementById('int-filters');
  const gridEl    = document.getElementById('int-grid');
  if (filtersEl) filtersEl.innerHTML = intFiltersHTML();

function intApply(id, cta) {
  S.intApplied[id] = true;
  const btn = document.querySelector(`#int-grid .primary[onclick="intApply(${id},'${cta}')"]`);
  if (btn) { btn.className='primary done'; btn.disabled=true; btn.textContent='✓ Aplicado'; }

  if (el) el.textContent = INT_INSIGHTS.filter(x => !S.intDismissed[x.id]).length + ' insights activos';

function intDismiss(id) {
  S.intDismissed[id] = true;
  const gridEl    = document.getElementById('int-grid');

  if (gridEl)    gridEl.innerHTML    = intGridHTML();
  if (filtersEl) filtersEl.innerHTML = intFiltersHTML();
  const el = document.getElementById('int-active-count');
  if (el) el.textContent = INT_INSIGHTS.filter(x => !S.intDismissed[x.id]).length + ' insights activos';
}
/* ════════════════════════════════════════════════

function costsSorted() {
  let arr = [...COST_DISHES];
  if (S.costsCat !== 'Todos') arr = arr.filter(d => d.cat === S.costsCat);
  if      (S.costsSort === 'margin') arr.sort((a,b) => marginOf(b) - marginOf(a));
  else if (S.costsSort === 'net')    arr.sort((a,b) => (b.price-b.cost)*b.sold - (a.price-a.cost)*a.sold);
  else                               arr.sort((a,b) => b.sold - a.sold);
  return arr;
}

function costsTableHTML() {
  const sorted = costsSorted();
  return sorted.map((d, i) => {
    const m   = marginOf(d);
    const cls = classFor(m);
    const net = (d.price - d.cost) * d.sold;
    return `
<div class="row-wrap${S.costsSel === d.id ? ' sel' : ''}" onclick="costsSelectDish('${d.id}')">
  <div class="cell" style="font-family:'JetBrains Mono';font-size:10px;color:rgba(237,232,216,0.3);letter-spacing:0.12em">${String(i+1).padStart(2,'0')}</div>
  <div class="cell"><span class="dish-n">${d.nm}</span></div>
  <div class="cell"><span class="cat">${d.cat}</span></div>
  <div class="cell r"><span class="money muted"><span class="cur">$</span>${ars(d.cost)}</span></div>
  <div class="cell r"><span class="money"><span class="cur">$</span>${ars(d.price)}</span></div>
  <div class="cell">
    <div class="mbar-wrap">
      <div class="mbar"><div class="f ${cls}" style="width:${m}%"></div></div>
      <div class="mbar-lbl">
        <span style="color:${cls==='ok'?'#3BC28B':cls==='warn'?'#F0B946':'#E86A6A'};font-family:'Instrument Serif';font-style:italic;font-size:15px">${m}%</span>
        <span style="opacity:0.5">${cls==='ok'?'verde':cls==='warn'?'amarillo':'rojo'}</span>
      </div>
    </div>
  </div>
  <div class="cell r" style="font-family:'JetBrains Mono';font-size:12px;color:rgba(237,232,216,0.78)">${d.sold}<span style="opacity:0.5"> u</span></div>
  <div class="cell r"><span class="money"><span class="cur">$</span>${ars(net)}</span></div>
</div>`;
  }).join('');
}

    <div class="mini"><div class="ll">Precio venta</div><div class="vv"><span style="font-size:11px;color:rgba(237,232,216,0.4);margin-right:2px">$</span>${ars(d.price)}</div></div>
    <div class="mini"><div class="ll">Margen</div><div class="vv" style="color:${mColor}">${m}%</div></div>

    <div class="nm">Costo total de ingredientes</div>
    <div class="pct"></div>
    <div class="amt"><span class="cur">$</span>${ars(d.cost)}</div>
  </div>
  <div style="margin-top:18px">
    <button class="primary-cta" style="width:100%" onclick="costsAddReport()">Agregar al informe</button>

}

function renderCosts(el) {

  const projNet   = COST_DISHES.reduce((s,d) => s + (d.price - d.cost) * d.sold, 0);

  const CATS  = ['Todos','Principal','Entrada','Postre'];
  const SORTS = [['margin','Por margen'],['net','Por ingreso neto'],['sold','Por vendidos']];

  el.innerHTML = `
<!-- Screen head -->
<div class="screen-head">
  <div class="ph-l">
    <div class="kicker">
      <span style="cursor:pointer;color:#4A9EFF" onclick="navigate('overview')">← Overview</span>
      <span class="sep"></span><span>Menú</span>

    </div>
    <div class="seg" id="costs-sort-seg">
      ${SORTS.map(([v,l]) => `<button class="${S.costsSort===v?'on':''}" onclick="costsSetSort('${v}')">${l}</button>`).join('')}
    </div>
    <button class="btn-ghost">Exportar</button>
  </div>
</div>

<!-- KPIs -->
<div class="kpis" style="flex:0 0 auto">
  ${kpiHTML({ kl:'Margen promedio',          value:avgMargin, unit:'%',     icon:'chart', note:'5 PLATOS EVALUADOS' })}
  ${kpiHTML({ kl:'Más rentable',             value:best.nm,   valFontSize:28, icon:'up',
    icStyle:'background:rgba(59,194,139,0.15);color:#3BC28B',
    style:'border-color:rgba(59,194,139,0.35)',
    delta:marginOf(best)+'% margen', deltaDir:'up' })}
  ${kpiHTML({ kl:'Menos rentable',           value:worst.nm,  valFontSize:28, icon:'down',
    icStyle:'background:rgba(232,106,106,0.15);color:#E86A6A',
    style:'border-color:rgba(232,106,106,0.35)',
    delta:marginOf(worst)+'% margen', deltaDir:'down' })}
  ${kpiHTML({ kl:'Ingreso neto proyectado',  cur:'$', value:ars(projNet), icon:'cash', delta:'+12% vs. ayer', deltaDir:'up' })}
</div>

<!-- Cost layout -->
<div class="cost-layout">

  <!-- Table panel -->
  <div class="panel">
    <div class="p-head">
      <div class="l"><h2>Platos · costos y márgenes</h2><span class="kk">Click en un plato para ver desglose</span></div>
    </div>
    <div class="p-body">
      <div class="cost-tbl">
        <div class="th"></div>
        <div class="th">Plato</div>
        <div class="th">Categoría</div>
        <div class="th r">Costo</div>
        <div class="th r">Precio</div>
        <div class="th">Margen %</div>
        <div class="th r">Vendidos</div>
        <div class="th r">Ingreso neto</div>
        <div id="costs-rows">${costsTableHTML()}</div>
      </div>
    </div>
  </div>

  <!-- Breakdown panel -->
  <div class="break-panel" id="costs-break">${costsBreakHTML()}</div>

</div>`;
}

/* ── Costs handlers ── */
function costsSetSort(v) {
  S.costsSort = v;
  /* update seg buttons */
  document.querySelectorAll('#costs-sort-seg button').forEach(b => {
    b.className = b.textContent.includes(v==='margin'?'margen':v==='net'?'neto':'vendidos') ? 'on' : '';
  });
  const rows = document.getElementById('costs-rows');
  if (rows) rows.innerHTML = costsTableHTML();
}
function costsSetCat(c) {
  S.costsCat = c;
  document.querySelectorAll('#costs-cat-seg button').forEach(b => {
    b.className = b.textContent === c ? 'on' : '';
  });
  const rows = document.getElementById('costs-rows');
  if (rows) rows.innerHTML = costsTableHTML();
}
function costsSelectDish(id) {
  S.costsSel = id;
  /* update row selection classes */
  document.querySelectorAll('.cost-tbl .row-wrap').forEach(rw => {
    const isSelected = rw.getAttribute('onclick') === `costsSelectDish('${id}')`;
    rw.classList.toggle('sel', isSelected);
  });
  const panel = document.getElementById('costs-break');
  if (panel) panel.innerHTML = costsBreakHTML();
}
function costsAddReport() {
  showToast('✓ Análisis detallado agregado al informe de costos');
}

function fit() {
  const sx = window.innerWidth  / 1920;
  const sy = window.innerHeight / 1080;
  const s  = Math.min(sx, sy);
  document.getElementById('canvas').style.transform =
    'translate(-50%, -50%) scale(' + s + ')';
}
window.addEventListener('resize', fit);
window.addEventListener('load', fit);
document.addEventListener('DOMContentLoaded', fit);

renderContent();
fit();

}
